<!DOCTYPE html>
<html>
<head>
  <title>Snake game app</title>
  <style>
    body {
      text-align: center;
      background: #020617;
      color: white;
      font-family: Arial;
    }

    canvas {
      background: black;
      border: 3px solid lime;
      margin-top: 10px;
      touch-action: none;
    }

    #info {
      margin-top: 10px;
      font-size: 18px;
    }

    button {
      padding: 12px;
      margin: 5px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: lime;
    }
  </style>
</head>
<body>

<h2>🐍 Snake Mobile</h2>
<div id="info">Tap START to play</div>

<button onclick="startGame()">▶️ Start Game</button>

<br>

<canvas id="game" width="300" height="300"></canvas>

<div>
  <button onclick="setDir('UP')">⬆️</button><br>
  <button onclick="setDir('LEFT')">⬅️</button>
  <button onclick="setDir('RIGHT')">➡️</button><br>
  <button onclick="setDir('DOWN')">⬇️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let snake, food, direction, score, speed, game;

// sounds (will start only after button click)
let eatSound, gameOverSound, bgMusic;

function startGame() {
  // init sounds AFTER user click ✅
  eatSound = new Audio("https://www.soundjay.com/button/beep-07.wav");
  gameOverSound = new Audio("https://www.soundjay.com/button/beep-10.wav");
  bgMusic = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");

  bgMusic.loop = true;
  bgMusic.volume = 0.2;
  bgMusic.play();

  snake = [{x: 140, y: 140}];
  direction = "RIGHT";
  score = 0;
  speed = 150;

  food = randomFood();

  if (game) clearInterval(game);
  game = setInterval(draw, speed);
}

function randomFood() {
  return {
    x: Math.floor(Math.random() * 15) * 20,
    y: Math.floor(Math.random() * 15) * 20
  };
}

function setDir(dir) {
  if (dir === "LEFT" && direction !== "RIGHT") direction = "LEFT";
  if (dir === "RIGHT" && direction !== "LEFT") direction = "RIGHT";
  if (dir === "UP" && direction !== "DOWN") direction = "UP";
  if (dir === "DOWN" && direction !== "UP") direction = "DOWN";
}

// swipe control (FIXED)
let startX = 0, startY = 0;

canvas.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

canvas.addEventListener("touchend", e => {
  let dx = e.changedTouches[0].clientX - startX;
  let dy = e.changedTouches[0].clientY - startY;

  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 30) setDir("RIGHT");
    else if (dx < -30) setDir("LEFT");
  } else {
    if (dy > 30) setDir("DOWN");
    else if (dy < -30) setDir("UP");
  }
});

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, 300, 300);

  // snake
  snake.forEach((p, i) => {
    ctx.fillStyle = i === 0 ? "lime" : "green";
    ctx.fillRect(p.x, p.y, 20, 20);
  });

  // food
  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, 20, 20);

  let headX = snake[0].x;
  let headY = snake[0].y;

  if (direction === "LEFT") headX -= 20;
  if (direction === "RIGHT") headX += 20;
  if (direction === "UP") headY -= 20;
  if (direction === "DOWN") headY += 20;

  // collision
  if (
    headX < 0 || headY < 0 ||
    headX >= 300 || headY >= 300 ||
    snake.some(s => s.x === headX && s.y === headY)
  ) {
    gameOverSound.play();
    bgMusic.pause();
    alert("💥 Game Over! Score: " + score);
    clearInterval(game);
    return;
  }

  // eat
  if (headX === food.x && headY === food.y) {
    score++;
    eatSound.play();
    document.getElementById("info").innerText = "Score: " + score;

    food = randomFood();

    // speed up
    if (speed > 70) {
      speed -= 5;
      clearInterval(game);
      game = setInterval(draw, speed);
    }
  } else {
    snake.pop();
  }

  snake.unshift({x: headX, y: headY});
}
</script>

</body>
</html>
