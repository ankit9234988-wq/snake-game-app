<!DOCTYPE html>
<html>
<head>
  <title>Ultra Snake Game</title>
  <style>
    body {
      text-align: center;
      background: #020617;
      color: white;
      font-family: Arial;
    }

    h1 {
      color: #22c55e;
    }

    canvas {
      background: #000;
      border: 3px solid #22c55e;
      margin-top: 10px;
      touch-action: none;
    }

    #info {
      margin-top: 10px;
      font-size: 18px;
    }

    .controls {
      margin-top: 15px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      font-size: 18px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h1>🐍 Ultra Snake</h1>
<div id="info">Score: 0 | High Score: 0</div>

<canvas id="game" width="400" height="400"></canvas>

<div class="controls">
  <button onclick="setDir('UP')">⬆️</button><br>
  <button onclick="setDir('LEFT')">⬅️</button>
  <button onclick="setDir('RIGHT')">➡️</button><br>
  <button onclick="setDir('DOWN')">⬇️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// sounds
const eatSound = new Audio("https://www.soundjay.com/button/beep-07.wav");
const gameOverSound = new Audio("https://www.soundjay.com/button/beep-10.wav");
const bgMusic = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.3;
bgMusic.play();

let box = 20;
let snake = [{x: 200, y: 200}];
let direction = "RIGHT";
let score = 0;
let speed = 120;

// high score
let highScore = localStorage.getItem("snakeHighScore") || 0;

function updateInfo() {
  document.getElementById("info").innerText =
    "Score: " + score + " | High Score: " + highScore;
}
updateInfo();

// food
function randomFood() {
  return {
    x: Math.floor(Math.random() * 20) * box,
    y: Math.floor(Math.random() * 20) * box
  };
}
let food = randomFood();

// keyboard control
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
  if (e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
  if (e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
  if (e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
});

// mobile buttons
function setDir(dir) {
  if (dir === "LEFT" && direction !== "RIGHT") direction = "LEFT";
  if (dir === "RIGHT" && direction !== "LEFT") direction = "RIGHT";
  if (dir === "UP" && direction !== "DOWN") direction = "UP";
  if (dir === "DOWN" && direction !== "UP") direction = "DOWN";
}

// swipe control
let startX, startY;

canvas.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

canvas.addEventListener("touchmove", e => {
  let dx = e.touches[0].clientX - startX;
  let dy = e.touches[0].clientY - startY;

  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0 && direction !== "LEFT") direction = "RIGHT";
    else if (dx < 0 && direction !== "RIGHT") direction = "LEFT";
  } else {
    if (dy > 0 && direction !== "UP") direction = "DOWN";
    else if (dy < 0 && direction !== "DOWN") direction = "UP";
  }
});

// draw snake (rounded + glow)
function drawSnakePart(x, y, head=false) {
  ctx.fillStyle = head ? "#22c55e" : "#4ade80";
  ctx.beginPath();
  ctx.arc(x + box/2, y + box/2, box/2, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowColor = "#22c55e";
  ctx.shadowBlur = 10;
}

// game loop
function draw() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, 400, 400);

  // snake
  snake.forEach((p, i) => drawSnakePart(p.x, p.y, i === 0));

  // food
  ctx.fillStyle = "#ef4444";
  ctx.fillRect(food.x, food.y, box, box);

  let headX = snake[0].x;
  let headY = snake[0].y;

  if (direction === "LEFT") headX -= box;
  if (direction === "RIGHT") headX += box;
  if (direction === "UP") headY -= box;
  if (direction === "DOWN") headY += box;

  // collision
  if (
    headX < 0 || headY < 0 ||
    headX >= 400 || headY >= 400 ||
    snake.some(s => s.x === headX && s.y === headY)
  ) {
    gameOverSound.play();

    if (score > highScore) {
      localStorage.setItem("snakeHighScore", score);
    }

    alert("💥 Game Over!");
    location.reload();
  }

  // eat
  if (headX === food.x && headY === food.y) {
    score++;
    eatSound.play();
    food = randomFood();

    if (score > highScore) highScore = score;
    updateInfo();

    if (speed > 60) speed -= 3;
    clearInterval(game);
    game = setInterval(draw, speed);
  } else {
    snake.pop();
  }

  snake.unshift({x: headX, y: headY});
}

let game = setInterval(draw, speed);
</script>

</body>
</html>
